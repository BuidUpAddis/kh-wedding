<!doctype html>
<html lang="am">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="Digital wedding invitation for Kidus and Heran."
    />
    <meta property="og:title" content="Kidus & Heran Wedding Invitation" />
    <meta
      property="og:description"
      content="A digital wedding invitation card for Kidus and Heran."
    />
    <meta property="og:image" content="assets/kidus-heran-wedding-invite.png" />
    <title>Kidus & Heran Wedding Invitation</title>
    <link
      rel="preload"
      href="assets/kidus-heran-wedding-invite.png"
      as="image"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="invitation-page" aria-labelledby="page-title">
      <h1 id="page-title" class="sr-only">
        Kidus and Heran wedding invitation
      </h1>

      <div class="ambient" aria-hidden="true">
        <img
          class="soft-backdrop"
          src="assets/kidus-heran-wedding-invite.png"
          alt=""
        />
        <div class="silk silk-one"></div>
        <div class="silk silk-two"></div>
        <div class="petal-field" id="petal-field"></div>
      </div>

      <section class="stage-shell" aria-label="Wedding invitation card">
        <div class="stage gift-scene is-closed" id="stage">
          <div class="paper-stack" aria-hidden="true">
            <span></span>
            <span></span>
            <span></span>
          </div>

          <div class="card-box" aria-hidden="true">
            <div class="box-face">
              <span class="box-floral floral-top"></span>
              <span class="box-floral floral-bottom"></span>
              <span class="box-monogram">K &amp; H</span>
              <span class="box-date">19 2018</span>
            </div>
          </div>

          <button
            class="ribbon-release"
            id="ribbon-button"
            type="button"
            aria-controls="invite-card download-panel"
            aria-expanded="false"
          >
            <span class="ribbon-band ribbon-band-horizontal"></span>
            <span class="ribbon-band ribbon-band-vertical"></span>
            <span class="bow bow-left"></span>
            <span class="bow bow-right"></span>
            <span class="bow-tail bow-tail-left"></span>
            <span class="bow-tail bow-tail-right"></span>
            <span class="bow-knot">K &amp; H</span>
            <span class="button-label">Open</span>
          </button>

          <div class="card-orbit" id="invite-panel">
            <div class="card-depth" aria-hidden="true"></div>
            <article class="invite-card" id="invite-card">
              <img
                src="assets/kidus-heran-wedding-invite.png"
                alt="Wedding invitation card for Kidus and Heran"
                draggable="false"
              />
              <span class="card-shine" aria-hidden="true"></span>
            </article>
          </div>
        </div>
      </section>

      <section class="download-panel" id="download-panel" aria-live="polite">
        <a
          class="download-link"
          href="assets/kidus-heran-wedding-invite.png"
          download="Kidus-Heran-Wedding-Invitation.png"
        >
          Download invitation
        </a>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
